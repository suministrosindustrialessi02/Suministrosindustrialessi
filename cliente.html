<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mi Orden — Suministros Industriales SI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0f0d0b; --muted:#6b6358; --c-orange:#f59d1e; --c-red:#e23c2b; --c-magenta:#c02a7a; --c-purple:#5c2a82; --c-yellow:#f7c131; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Inter',sans-serif; background:#f5f3ef; color:var(--ink); min-height:100vh; }
  header{ background:var(--ink); color:#fff; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  header .t{ font-family:'Saira Condensed'; font-weight:800; text-transform:uppercase; font-size:18px; letter-spacing:0.02em; }
  .btn-logout{ background:transparent; border:1px solid rgba(255,255,255,0.4); color:#fff; padding:8px 14px; border-radius:6px; font-size:13px; cursor:pointer; }
  main{ max-width:520px; margin:0 auto; padding:50px 24px 60px; text-align:center; }
  h1{ font-family:'Saira Condensed'; font-weight:800; text-transform:uppercase; font-size:26px; margin:0 0 6px; }
  .sub{ color:var(--muted); font-size:14px; margin-bottom:36px; }

  .ring-wrap{ position:relative; width:220px; height:220px; margin:0 auto 28px; }
  .ring{
    width:220px; height:220px; border-radius:50%;
    background: conic-gradient(var(--c-orange) calc(var(--pct) * 1%), #e9e4da 0);
    display:flex; align-items:center; justify-content:center;
    transition: background 0.4s;
  }
  .ring-inner{
    width:172px; height:172px; border-radius:50%; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  .ring-pct{ font-family:'Saira Condensed'; font-weight:800; font-size:42px; line-height:1; }
  .ring-label{ font-size:12px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.04em; }

  .card{ background:#fff; border-radius:12px; padding:20px; box-shadow:0 1px 6px rgba(0,0,0,0.07); text-align:left; }
  .card h3{ font-family:'Saira Condensed'; text-transform:uppercase; font-size:14px; letter-spacing:0.04em; color:var(--muted); margin:0 0 14px; }
  .step{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #f0ece4; font-size:14px; }
  .step:last-child{ border-bottom:none; }
  .step-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; font-weight:700; }
  .step-dot.done{ background:#16a34a; color:#fff; }
  .step-dot.pending{ background:#e9e4da; color:var(--muted); }
  .step-name.done{ color:var(--ink); font-weight:600; }
  .step-name.pending{ color:var(--muted); }

  .badge-orden{ display:inline-block; background:rgba(245,157,30,0.15); color:#b5650a; font-size:12px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:6px 14px; border-radius:20px; margin-bottom:24px; }
  .empty-msg{ color:var(--muted); font-size:14px; padding:40px 0; }
</style>
</head>
<body>

<header>
  <div class="t">Suministros Industriales SI</div>
  <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<main>
  <h1 id="saludo">Hola</h1>
  <div class="sub">Aquí puedes ver el avance de tu servicio.</div>

  <div id="contenido">
    <div class="empty-msg">Cargando información de tu orden...</div>
  </div>
</main>

<script>
const TABLE_ORDENES = "tblcyGwDeOORxELJg";
const OF = {
  serie:        "fldj245KNDJ2B5jxG",
  folio:        "fldpMUMLpNCGGQcIo",
  cliente:      "fldUkOvdOHTXMDWX7",
  estado:       "fldRtvzailqq6WbQu",
  tipoServicio: "fld0rhBYkk5nAnXcT",
  checklist:    "flduerG3x3cKkt07p",
  pintura:      "fldRDnTfyWt5XmCFr",
  evidencia:    "fldvJAyOkHXUKfiov"
};

const _sesion = (() => {
  try{ return JSON.parse(localStorage.getItem("si_session")); }catch(e){ return null; }
})();

if(!_sesion || _sesion.rol !== "Cliente"){
  window.location.href = "login.html";
} else {
  document.getElementById("saludo").textContent = "Hola, " + (_sesion.nombre || "");
  cargarOrden();
}

function normEstadoCliente(e){
  return (e||"").toString().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();
}

async function cargarOrden(){
  const cont = document.getElementById("contenido");
  const valor = (_sesion.ordenAsociada || "").trim();

  if(!valor){
    cont.innerHTML = `<div class="empty-msg">No tienes una orden asociada todavía. Contacta a Suministros Industriales para más información.</div>`;
    return;
  }

  try{
    const vEsc = valor.replace(/"/g, '\\"');
    const formula = encodeURIComponent(`OR({${OF.serie}}="${vEsc}", {${OF.folio}}="${vEsc}")`);
    const url = `/.netlify/functions/airtable?table=${TABLE_ORDENES}&filterByFormula=${formula}&returnFieldsByFieldId=true`;
    const resp = await fetch(url);
    const data = await resp.json();
    const rec = (data.records || [])[0];

    if(!rec){
      cont.innerHTML = `<div class="empty-msg">No encontramos tu orden (${valor}). Contacta a Suministros Industriales.</div>`;
      return;
    }

    const f = rec.fields;
    const tipoServicioRaw = f[OF.tipoServicio];
    const esGeneral = ((tipoServicioRaw && tipoServicioRaw.name) || tipoServicioRaw) === "General";
    const estadoRaw = f[OF.estado];
    const estado = (estadoRaw && estadoRaw.name) || estadoRaw || "";
    const estadoNorm = normEstadoCliente(estado);

    if(estadoNorm === "no autorizado"){
      cont.innerHTML = `
        <div class="badge-orden">Orden: ${valor}</div>
        <div class="card" style="text-align:center">
          <h3 style="color:var(--c-red)">Servicio no autorizado</h3>
          <p style="color:var(--muted);font-size:14px">Contacta a Suministros Industriales para conocer el siguiente paso de tu equipo.</p>
        </div>
      `;
      return;
    }

    const pasos = esGeneral ? [
      { nombre: "Recibido en Centro de Servicio", hecho: true },
      { nombre: "Diagnóstico y autorización", hecho: !["recibido","por llegar","en diagnostico"].includes(estadoNorm) },
      { nombre: "Reparación / servicio en proceso", hecho: ["terminado","entregado"].includes(estadoNorm) },
      { nombre: "Entrega", hecho: estadoNorm === "entregado" }
    ] : [
      { nombre: "Recibido en Centro de Servicio", hecho: true },
      { nombre: "Inspección / Checklist", hecho: !!f[OF.checklist] },
      { nombre: "Pintura y acabado", hecho: !!f[OF.pintura] },
      { nombre: "Evidencia final / Entrega", hecho: !!f[OF.evidencia] }
    ];

    const completados = pasos.filter(p => p.hecho).length;
    const pct = Math.round((completados / pasos.length) * 100);

    cont.innerHTML = `
      <div class="badge-orden">Orden: ${valor}</div>
      <div class="ring-wrap">
        <div class="ring" style="--pct:${pct}">
          <div class="ring-inner">
            <div class="ring-pct">${pct}%</div>
            <div class="ring-label">Completado</div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3>Etapas del servicio</h3>
        ${pasos.map(p => `
          <div class="step">
            <div class="step-dot ${p.hecho ? 'done' : 'pending'}">${p.hecho ? '✓' : ''}</div>
            <div class="step-name ${p.hecho ? 'done' : 'pending'}">${p.nombre}</div>
          </div>
        `).join("")}
      </div>
    `;
  } catch(err){
    cont.innerHTML = `<div class="empty-msg">Error al cargar tu orden. Intenta de nuevo más tarde.</div>`;
  }
}

function cerrarSesion(){
  localStorage.removeItem("si_session");
  window.location.href = "login.html";
}
</script>

</body>
</html>
